[DIE]
folder = ..\cli\bin\detectors\die
url = horsicq/DIE-engine
from = github
re_download = die_win64_portable_(?:\S+).zip
merge = true
post_unpack = scripts\clean-die.bat
local_version = 3.21

[Magika]
folder = ..\cli\bin\detectors\magika
from = web
url = https://github.com/google/magika/releases
re_version = cli/v([\d.]+)/magika-cli-x86_64-pc-windows-msvc.zip
re_download = (https://[^"]+magika-cli-x86_64-pc-windows-msvc.zip)
post_unpack = scripts\clean-magika.bat
local_version = 1.1.0

[7-Zip]
folder = ..\cli\bin\extractors\7z
url = ip7z/7zip
from = github
re_download = 7z(?:\d+).exe
merge = true
post_unpack = scripts\clean-7z.bat
local_version = 26.02

[innounp]
