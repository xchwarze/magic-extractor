name: Create Release
on:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  generate-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -r src/requirements.txt
          pip install -r gui/requirements.txt

      - name: Install PyInstaller and pyinstaller-versionfile
        run: |
          pip install pyinstaller
          pip install pyinstaller-versionfile

      - name: Determine version from release tag (fallback 0.0.0)
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"          # strip a leading 'v'
          VERSION="${VERSION:-0.0.0}" # fallback for workflow_dispatch / no tag
          echo "Detected VERSION: $VERSION"
          echo "PROJECT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate version file
        shell: bash
        run: |
          pyivf-make_version \
            --outfile src/version_info.txt \
            --version ${{ env.PROJECT_VERSION }} \
            --company-name "DSR!" \
            --file-description "Magic Extractor - universal extraction tool" \
            --internal-name "magic-extractor" \
            --legal-copyright "© 2026 github.com/xchwarze. All rights reserved." \
            --original-filename "magic-extractor.exe" \
            --product-name "Magic Extractor"
          echo "Generated version file content:"
          cat src/version_info.txt

      - name: Build the .exe application
        working-directory: ./src
        run: pyinstaller --onefile main.py --name magic-extractor --icon=../assets/appicon.ico --version-file=version_info.txt --collect-data puremagic

      - name: Build the GUI .exe application
        working-directory: ./src
        run: pyinstaller --onefile ../gui/main.py --name magic-extractor-gui --noconsole --icon=../assets/appicon.ico --paths .. --hidden-import gui.app --hidden-import gui.runner --hidden-import gui.config_io --hidden-import gui.theme --hidden-import gui.menubar --collect-all sv_ttk --collect-all darkdetect --hidden-import pywinstyles --collect-all tkinterdnd2

      - name: Bundle bin/, data/, config.ini, license and docs beside the exe
        shell: bash
        run: |
          cp -r src/bin  src/dist/bin
          cp -r src/data src/dist/data
          cp src/config.ini src/dist/config.ini
          cp LICENSE.txt readme.md formats.md src/dist/
          test -f src/dist/magic-extractor-gui.exe

      - name: Smoke test (extract a bundled sample)
        run: ./src/dist/magic-extractor.exe extract test/7z/test-file.7z

      - name: Upload the built application as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: magic-extractor
          path: ./src/dist

  create-release:
    needs: generate-build
    if: github.event_name == 'release' && github.event.action == 'created'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: magic-extractor
          path: ./magic-extractor

      - name: Compress the build
        run: zip -r magic-extractor.zip magic-extractor/

      - name: Upload as release download
        uses: softprops/action-gh-release@v2
        with:
          files: magic-extractor.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
