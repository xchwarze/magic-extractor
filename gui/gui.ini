; Magic Extractor GUI settings.
;
; Separate from the CLI's config.ini: that file holds extraction behavior
; (open_output_folder, check_free_space, check_unicode, fix_file_extensions,
; create_log_files, fast_check) and is edited from Preferences. This file holds
; GUI-only state. Delete it to restore defaults.

[gui]
; Theme: auto (follow the OS), dark, or light.
theme = auto
; Keep the window open after a run finishes; uncheck to auto-close on success.
keep_open = True
; Keep the window above other windows.
always_on_top = False

[defaults]
; Mode the window opens in: extract or scan. Updated to the last one used.
mode = extract
; Auto-fill the destination from the source (<dir>/<name>) when the destination
; field is empty. Never overwrites a path you typed.
auto_fill_destination = True
; Keep the destination fixed across source changes (the 'lock' checkbox state).
lock_destination = False
; Per-run extraction options; mirrors the Run options dialog.
; Passwords are intentionally NEVER stored here.
recursive = False
max_depth = 5
bruteforce = False
fast_check = True

[history]
; Remember recently used source files and destination directories, shown as
; dropdowns. Off by default.
enabled = False
max_entries = 10

[window]
; Remember the window size/position between sessions.
remember_geometry = True
; Saved automatically at exit; leave blank to center on first run.
geometry =
